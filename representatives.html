<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Representatives & Speakers | MechMayhem</title>
  <link rel="stylesheet" href="style.css" />
</head>
<script src="script.js"></script>
<body>

  <header class="page-header">
    <h1>External Representatives and Speakers</h1>
    <p>Join MechMayhem as a speaker, industry representative, judge, or sponsor.</p>
  </header>

  <main class="section">

    <h2>Confirm Attendance | Page under construction</h2>

    <form class="form">
      <label>
        Full Name
        <input type="text" name="name" required />
      </label>

      <label>
        Email
        <input type="email" name="email" required />
      </label>

      <label>
        Company / Organisation
        <input type="text" name="company" />
      </label>

      <label>
        Message
        <textarea name="message" placeholder="Let us know how you would like to be involved."></textarea>
      </label>

      <label>
        <input type="checkbox" name="sponsor-interest" />
        Interested in being a sponsor
      </label>

      <button type="submit">Confirm Attendance</button>
    </form>

  </main>

</body>
</html>
